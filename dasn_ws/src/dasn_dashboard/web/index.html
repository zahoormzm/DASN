<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DASN — Distributed Autonomous Security Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/roslib/build/roslib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: #1e2130;
            --bg-card-hover: #252840;
            --border-subtle: #2a2d3a;
            --border-active: #3b82f6;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.3);
            --success-green: #22c55e;
            --success-green-glow: rgba(34, 197, 94, 0.3);
            --warning-yellow: #eab308;
            --warning-yellow-glow: rgba(234, 179, 8, 0.3);
            --alert-orange: #f97316;
            --alert-red: #ef4444;
            --alert-red-glow: rgba(239, 68, 68, 0.4);
            --critical-red: #dc2626;
            --tamper-purple: #a855f7;
            --tamper-purple-glow: rgba(168, 85, 247, 0.3);
            --text-xs: 0.75rem;
            --text-sm: 0.875rem;
            --text-base: 1rem;
            --text-lg: 1.125rem;
            --text-xl: 1.25rem;
            --text-2xl: 1.5rem;
            --text-3xl: 1.875rem;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .card {
            background: rgba(30, 33, 48, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }
        .card:hover {
            background: rgba(37, 40, 64, 0.9);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Status Bar */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(15, 17, 23, 0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            min-height: 48px;
        }
        .status-bar .section {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: var(--text-xs);
            font-weight: 500;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            white-space: nowrap;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-dot.online { background: var(--success-green); }
        .status-dot.offline { background: var(--alert-red); }
        .status-dot.connected {
            background: var(--success-green);
            animation: connection-pulse 2s infinite;
        }
        .status-dot.disconnected {
            background: var(--alert-red);
            animation: connection-pulse 1s infinite;
        }

        .battery-bar {
            width: 32px;
            height: 12px;
            border: 1px solid var(--text-muted);
            border-radius: 2px;
            position: relative;
            display: inline-block;
        }
        .battery-bar::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 3px;
            width: 3px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 0 1px 1px 0;
        }
        .battery-fill {
            height: 100%;
            border-radius: 1px;
            transition: width 0.3s;
        }

        .threat-badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: var(--text-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .threat-0 { background: rgba(34, 197, 94, 0.2); color: var(--success-green); }
        .threat-1 { background: rgba(234, 179, 8, 0.2); color: var(--warning-yellow); }
        .threat-2 { background: rgba(249, 115, 22, 0.2); color: var(--alert-orange); }
        .threat-3 { background: rgba(239, 68, 68, 0.2); color: var(--alert-red); }
        .threat-4 { background: rgba(220, 38, 38, 0.3); color: var(--critical-red); }
        .threat-5 { background: rgba(168, 85, 247, 0.2); color: var(--tamper-purple); }

        /* Main Layout */
        .main-content {
            margin-top: 56px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 16px;
            max-width: 1600px;
            margin-left: auto;
            margin-right: auto;
        }

        .panel-title {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-title svg { width: 16px; height: 16px; }

        /* Zone Map */
        .zone-map-container {
            padding: 16px;
            min-height: 400px;
            position: relative;
        }
        .zone-map-svg {
            width: 100%;
            height: 100%;
            min-height: 360px;
        }
        .zone-polygon { cursor: pointer; transition: opacity 0.3s; }
        .zone-polygon:hover { filter: brightness(1.3); }
        .zone-label {
            font-size: 11px;
            fill: var(--text-primary);
            font-weight: 600;
            pointer-events: none;
            text-anchor: middle;
        }
        .bot-icon { transition: all 0.1s linear; }
        .bot-trail { fill: var(--accent-blue); opacity: 0.4; }
        .wall-line { stroke: var(--text-secondary); stroke-width: 3; stroke-linecap: round; }
        .dock-icon { fill: var(--success-green); opacity: 0.7; }
        .grid-line { stroke: rgba(255,255,255,0.03); stroke-width: 0.5; }

        @keyframes pulse-green { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.35; } }
        @keyframes pulse-yellow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.5; } }
        @keyframes pulse-orange { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.6; } }
        @keyframes pulse-red { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.75; } }
        @keyframes flash-critical { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.15; } }
        @keyframes flash-tamper { 0% { opacity: 0.5; } 25% { opacity: 0.2; } 50% { opacity: 0.6; } 75% { opacity: 0.15; } 100% { opacity: 0.5; } }
        @keyframes connection-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }
        @keyframes estop-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }
        @keyframes toast-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toast-out {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .zone-level-0 { fill: #22c55e; animation: pulse-green 3s infinite; }
        .zone-level-1 { fill: #eab308; animation: pulse-yellow 2s infinite; }
        .zone-level-2 { fill: #f97316; animation: pulse-orange 1.5s infinite; }
        .zone-level-3 { fill: #ef4444; animation: pulse-red 1s infinite; }
        .zone-level-4 { fill: #dc2626; animation: flash-critical 0.5s infinite; }
        .zone-level-5 { fill: #a855f7; animation: flash-tamper 0.7s infinite; }

        /* Camera Feeds */
        .camera-panel { padding: 16px; }
        .camera-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .camera-grid.expanded { grid-template-columns: 1fr; }
        .camera-feed {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
            cursor: pointer;
            border: 1px solid var(--border-subtle);
        }
        .camera-feed img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .camera-feed.offline {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            color: var(--text-muted);
        }
        .camera-feed .overlay-label {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: var(--text-xs);
            font-weight: 600;
        }
        .camera-feed .fps-counter {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: var(--text-xs);
            color: var(--success-green);
        }
        .camera-feed .timestamp-overlay {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: var(--text-xs);
            color: var(--text-secondary);
        }
        .face-box {
            position: absolute;
            border: 2px solid;
            border-radius: 4px;
            pointer-events: none;
        }
        .face-box.known { border-color: var(--success-green); }
        .face-box.unknown { border-color: var(--alert-red); }
        .face-box .face-label {
            position: absolute;
            top: -20px;
            left: 0;
            background: rgba(0,0,0,0.8);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            white-space: nowrap;
        }

        /* Control Panel */
        .control-panel { padding: 16px; }
        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .ctrl-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 14px;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: var(--text-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .ctrl-btn:hover:not(:disabled) {
            background: var(--bg-card-hover);
            border-color: var(--border-active);
        }
        .ctrl-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .ctrl-btn.arm-btn.armed {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--alert-red);
            color: var(--alert-red);
        }
        .ctrl-btn.arm-btn.disarmed {
            background: rgba(100, 116, 139, 0.15);
            border-color: var(--text-muted);
            color: var(--text-secondary);
        }
        .ctrl-btn.estop {
            grid-column: 1 / -1;
            background: rgba(220, 38, 38, 0.2);
            border-color: var(--critical-red);
            color: var(--critical-red);
            font-weight: 700;
            font-size: var(--text-base);
            padding: 14px;
        }
        .ctrl-btn.estop.bot-moving {
            animation: estop-pulse 1.5s infinite;
        }
        .ctrl-btn.estop:hover {
            background: rgba(220, 38, 38, 0.4);
        }
        .dispatch-select {
            padding: 8px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: var(--text-sm);
            font-family: inherit;
            outline: none;
        }
        .dispatch-select:focus { border-color: var(--border-active); }

        /* Sensor Detail Panel */
        .sensor-panel {
            position: fixed;
            top: 56px;
            left: 0;
            bottom: 0;
            width: 360px;
            background: rgba(15, 17, 23, 0.97);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-subtle);
            z-index: 90;
            overflow-y: auto;
            padding: 20px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        .sensor-panel.open { transform: translateX(0); }
        .sensor-panel .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
            padding: 4px;
        }
        .sensor-panel .close-btn:hover { color: var(--text-primary); }
        .sensor-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .sensor-row .label {
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        .sensor-row .value {
            font-size: var(--text-sm);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .indicator.active { background: var(--alert-red); box-shadow: 0 0 6px var(--alert-red-glow); }
        .indicator.inactive { background: var(--success-green); }
        .meter-bar {
            width: 80px;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .sparkline-container {
            width: 100%;
            height: 40px;
            margin-top: 4px;
        }
        .sparkline-container canvas { width: 100% !important; height: 40px !important; }

        /* Event Log */
        .event-log { padding: 16px; max-height: 400px; display: flex; flex-direction: column; }
        .event-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .event-filters select {
            padding: 4px 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: var(--text-xs);
            font-family: inherit;
            outline: none;
        }
        .event-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 300px;
        }
        .event-card {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(30, 33, 48, 0.5);
            border-left: 3px solid;
            font-size: var(--text-xs);
        }
        .event-card .event-time {
            color: var(--text-muted);
            font-family: 'Courier New', monospace;
            white-space: nowrap;
            min-width: 60px;
        }
        .event-card .event-zone {
            padding: 1px 6px;
            border-radius: 4px;
            background: var(--bg-secondary);
            font-weight: 600;
            white-space: nowrap;
        }
        .event-card .event-desc {
            color: var(--text-secondary);
            flex: 1;
        }
        .event-card .event-icon { font-size: 14px; flex-shrink: 0; }
        .event-border-0 { border-color: var(--success-green); }
        .event-border-1 { border-color: var(--warning-yellow); }
        .event-border-2 { border-color: var(--alert-orange); }
        .event-border-3 { border-color: var(--alert-red); }
        .event-border-4 { border-color: var(--critical-red); }
        .event-border-5 { border-color: var(--tamper-purple); }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 64px;
            right: 16px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 10px 16px;
            border-radius: 8px;
            background: rgba(30, 33, 48, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-left: 4px solid;
            font-size: var(--text-sm);
            max-width: 360px;
            pointer-events: auto;
            animation: toast-in 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.removing { animation: toast-out 0.3s ease forwards; }
        .toast .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px;
            font-size: 14px;
            margin-left: auto;
        }

        /* Settings Overlay */
        .settings-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }
        .settings-panel h2 {
            font-size: var(--text-xl);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .settings-panel h2 button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 22px;
        }
        .settings-section {
            margin-bottom: 24px;
        }
        .settings-section h3 {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .slider-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }
        .slider-row label {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            min-width: 140px;
        }
        .slider-row input[type=range] {
            flex: 1;
            margin: 0 12px;
            accent-color: var(--accent-blue);
        }
        .slider-row .slider-val {
            font-size: var(--text-sm);
            font-weight: 600;
            min-width: 40px;
            text-align: right;
        }
        .settings-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: var(--text-sm);
            font-family: inherit;
            outline: none;
            margin-bottom: 8px;
        }
        .settings-input:focus { border-color: var(--border-active); }
        .settings-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: var(--text-sm);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .settings-btn:hover { background: var(--bg-card-hover); border-color: var(--border-active); }
        .settings-btn.primary { background: var(--accent-blue); border-color: var(--accent-blue); }
        .settings-btn.primary:hover { background: #2563eb; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 250;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 24px;
            min-width: 320px;
            max-width: 500px;
        }
        .modal-content h3 { margin-bottom: 16px; }
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        /* Reconnection overlay */
        .reconnect-overlay {
            position: fixed;
            inset: 0;
            z-index: 400;
            background: rgba(15, 17, 23, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .reconnect-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Face enrollment grid */
        .face-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
        }
        .face-card-item {
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
        }
        .face-card-item img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 4px;
        }
        .face-card-item .face-name { font-size: var(--text-xs); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-content { grid-template-columns: 1fr; }
            .camera-grid { grid-template-columns: 1fr 1fr; }

        function useROSTopic(topicName, messageType, callback, throttle) {
            const { ros, connected } = useContext(ROSContext);

            useEffect(() => {
                if (!connected || !ros.current) return;
                const topic = new ROSLIB.Topic({ ros: ros.current, name: topicName, messageType, throttle_rate: throttle || 0 });
                const handler = (msg) => {
                    if (throttle) {
                        const now = Date.now();
                        if (now - lastRef.current < throttle) return;
                        lastRef.current = now;
                    }
                    cbRef.current(msg);
                };
                topic.subscribe(handler);
                return () => topic.unsubscribe(handler);
            }, [connected, topicName, messageType, throttle]);
        }

        function useROSPublisher(topicName, messageType) {

                ),
                React.createElement('div', { className: 'event-filters' },
                    React.createElement('select', { value: filterZone, onChange: e => setFilterZone(e.target.value) },
                        React.createElement('option', { value: 'All' }, 'All Zones'),
                        Object.keys(ZONES_CONFIG).map(z => React.createElement('option', { key: z, value: z }, z.replace('_', ' ')))
                    ),
                    React.createElement('select', { value: filterType, onChange: e => setFilterType(e.target.value) },
                        React.createElement('option', { value: 'All' }, 'All Types'),
                        ['face', 'sound', 'gas', 'auth', 'dispatch', 'system', 'alarm'].map(t =>
                            React.createElement('option', { key: t, value: t }, t.charAt(0).toUpperCase() + t.slice(1))
                        )
                    ),
                    React.createElement('select', { value: filterLevel, onChange: e => setFilterLevel(Number(e.target.value)) },
                        THREAT_LABELS.map((l, i) => React.createElement('option', { key: i, value: i }, `\u2265 ${l}`))
                    )
                ),
                React.createElement('div', { className: 'event-list' },
                    filtered.length === 0
                        ? React.createElement('div', { style: { color: 'var(--text-muted)', textAlign: 'center', padding: 24 } }, 'No events yet')
                        : filtered.map((ev, i) =>
                            React.createElement('div', { key: ev.id || i, className: `event-card event-border-${ev.level}` },
                                React.createElement('span', { className: 'event-icon' }, EVENT_ICONS[ev.type] || '\u{2139}'),
                                React.createElement('span', { className: 'event-time' }, ev.time),
                                React.createElement('span', { className: 'event-zone' }, (ev.zone || '').replace('_', ' ')),
                                React.createElement('span', { className: 'event-desc' }, ev.description)
                            )
                        )
                )
            );
        }

        // ─── ToastManager Component ───
        function ToastManager({ toasts, onDismiss }) {
            return React.createElement('div', { className: 'toast-container' },
                toasts.slice(0, 5).map(toast =>
                    React.createElement('div', {
                        key: toast.id,
                        className: `toast ${toast.removing ? 'removing' : ''}`,
                        style: { borderLeftColor: THREAT_COLORS[toast.level] || 'var(--accent-blue)' }
                    },
                        React.createElement('span', null, EVENT_ICONS[toast.type] || '\u{2139}'),
                        React.createElement('span', null, toast.message),
                        React.createElement('button', { className: 'toast-close', onClick: () => onDismiss(toast.id) }, '\u2715')
                    )
                )
            );
        }

        // ─── Settings Component ───
        function SettingsPanel({ weights, setWeights, nightConfig, setNightConfig, telegramConfig, setTelegramConfig, onClose }) {
            const [localWeights, setLocalWeights] = useState({ ...weights });
            const [localNight, setLocalNight] = useState({ ...nightConfig });
            const [localTelegram, setLocalTelegram] = useState({ ...telegramConfig });

            const weightKeys = ['radar_presence', 'pir_motion', 'sound_anomaly', 'unknown_face', 'gas_smoke_anomaly', 'auth_failure'];

            return React.createElement('div', { className: 'settings-overlay', onClick: onClose },
                React.createElement('div', { className: 'settings-panel', onClick: e => e.stopPropagation() },
                    React.createElement('h2', null,
                        'Settings',
                        React.createElement('button', { onClick: onClose }, '\u2715')
                    ),
                    React.createElement('div', { className: 'settings-section' },
                        React.createElement('h3', null, 'Threat Weights'),
                        weightKeys.map(key =>
                            React.createElement('div', { className: 'slider-row', key },
                                React.createElement('label', null, key.replace(/_/g, ' ')),
                                React.createElement('input', {
                                    type: 'range', min: 0, max: 1, step: 0.01,
                                    value: localWeights[key] || 0,
                                    onChange: e => setLocalWeights(w => ({ ...w, [key]: parseFloat(e.target.value) }))
                                }),
                                React.createElement('span', { className: 'slider-val' }, (localWeights[key] || 0).toFixed(2))
                            )
                        ),
                        React.createElement('div', { style: { display: 'flex', gap: 8, marginTop: 8 } },
                            React.createElement('button', { className: 'settings-btn primary', onClick: () => setWeights(localWeights) }, 'Apply'),
                            React.createElement('button', { className: 'settings-btn', onClick: () => setLocalWeights({ radar_presence: 0.25, pir_motion: 0.10, sound_anomaly: 0.20, unknown_face: 0.25, gas_smoke_anomaly: 0.10, auth_failure: 0.10 }) }, 'Reset')
                        )
                    ),
                    React.createElement('div', { className: 'settings-section' },
                        React.createElement('h3', null, 'Night Mode'),
                        React.createElement('div', { className: 'slider-row' },
                            React.createElement('label', null, 'Start Hour'),
                            React.createElement('input', {
                                type: 'range', min: 0, max: 23, step: 1,
                                value: localNight.start,
                                onChange: e => setLocalNight(n => ({ ...n, start: parseInt(e.target.value) }))
                            }),
                            React.createElement('span', { className: 'slider-val' }, `${localNight.start}:00`)
                        ),
                        React.createElement('div', { className: 'slider-row' },
                            React.createElement('label', null, 'End Hour'),
                            React.createElement('input', {
                                type: 'range', min: 0, max: 23, step: 1,
                                value: localNight.end,
                                onChange: e => setLocalNight(n => ({ ...n, end: parseInt(e.target.value) }))
                            }),
                            React.createElement('span', { className: 'slider-val' }, `${localNight.end}:00`)
                        ),
                        React.createElement('div', { className: 'slider-row' },
                            React.createElement('label', null, 'Multiplier'),
                            React.createElement('input', {
                                type: 'range', min: 1, max: 3, step: 0.1,
                                value: localNight.factor,
                                onChange: e => setLocalNight(n => ({ ...n, factor: parseFloat(e.target.value) }))
                            }),
                            React.createElement('span', { className: 'slider-val' }, `${localNight.factor.toFixed(1)}x`)
                        ),
                        React.createElement('button', { className: 'settings-btn primary', onClick: () => setNightConfig(localNight) }, 'Apply')
                    ),
                    React.createElement('div', { className: 'settings-section' },
                        React.createElement('h3', null, 'Telegram Notifications'),
                        React.createElement('input', {
                            className: 'settings-input',
                            type: 'password',
                            placeholder: 'Bot Token',
                            value: localTelegram.token,
                            onChange: e => setLocalTelegram(t => ({ ...t, token: e.target.value }))
                        }),
                        React.createElement('input', {
                            className: 'settings-input',
                            type: 'text',
                            placeholder: 'Chat ID',
                            value: localTelegram.chatId,
                            onChange: e => setLocalTelegram(t => ({ ...t, chatId: e.target.value }))
                        }),
                        React.createElement('div', { style: { display: 'flex', gap: 8 } },
                            React.createElement('button', { className: 'settings-btn primary', onClick: () => setTelegramConfig(localTelegram) }, 'Save'),
                            React.createElement('button', { className: 'settings-btn', onClick: () => {} }, 'Test Notification')
                        )
                    ),
                    React.createElement('div', { className: 'settings-section' },
                        React.createElement('h3', null, 'Zone Configuration'),
                        Object.keys(ZONES_CONFIG).map(z =>
                            React.createElement('div', { key: z, style: { display: 'flex', alignItems: 'center', gap: 8, padding: '4px 0' } },
                                React.createElement('span', { style: { flex: 1, fontSize: 'var(--text-sm)' } }, z),
                                React.createElement('span', { style: { fontSize: 'var(--text-xs)', color: 'var(--text-muted)' } }, ZONES_CONFIG[z].type)
                            )
                        )
                    ),
                    React.createElement('div', { className: 'settings-section' },
                        React.createElement('h3', null, 'Known Faces'),
                        React.createElement('div', { style: { color: 'var(--text-muted)', fontSize: 'var(--text-sm)' } }, 'No faces enrolled yet. Use "Enroll Face" to add.'),
                        React.createElement('button', { className: 'settings-btn', style: { marginTop: 8 } }, '\u{1F464} Enroll New Face')
                    )
                )
            );
        }

        // ─── EnrollModal Component ───
        function EnrollModal({ onClose }) {
            const [name, setName] = useState('');
            const [captured, setCaptured] = useState(null);

            return React.createElement('div', { className: 'modal-overlay', onClick: onClose },
                React.createElement('div', { className: 'modal-content', onClick: e => e.stopPropagation() },
                    React.createElement('h3', null, 'Enroll New Face'),
                    React.createElement('input', {
                        className: 'settings-input',
                        placeholder: "Person's name",
                        value: name,
                        onChange: e => setName(e.target.value)
                    }),
                    captured
                        ? React.createElement('img', { src: captured, alt: 'Captured', style: { width: '100%', borderRadius: 8, marginBottom: 12 } })
                        : React.createElement('div', {
                            style: {
                                width: '100%', height: 180, background: 'var(--bg-card)',
                                borderRadius: 8, display: 'flex', alignItems: 'center',
                                justifyContent: 'center', color: 'var(--text-muted)', marginBottom: 12
                            }
                        }, 'No frame captured'),
                    React.createElement('div', { className: 'modal-actions' },
                        React.createElement('button', { className: 'settings-btn', onClick: () => setCaptured('data:image/png;base64,placeholder') }, 'Capture from Camera'),
                        React.createElement('button', { className: 'settings-btn', onClick: onClose }, 'Cancel'),
                        React.createElement('button', {
                            className: 'settings-btn primary',
                            disabled: !name || !captured,
                            onClick: () => { onClose(); }
                        }, 'Save')
                    )
                )
            );
        }

        // ─── Main App ───
        function App() {
            // State
            const [botStatus, setBotStatus] = useState({ status: 'docked', battery_v: 11.1, position: { x: 0.5, y: 0.5 }, heading_deg: 0 });
            const [zoneThreats, setZoneThreats] = useState({
                FRONT_DOOR: { level: 0, score: 0.0, contributing_factors: [] },
                WINDOW_1: { level: 0, score: 0.0, contributing_factors: [] },
                BACK_DOOR: { level: 0, score: 0.0, contributing_factors: [] }
            });
            const [zoneSensorData, setZoneSensorData] = useState({});
            const [nodeStatuses, setNodeStatuses] = useState({
                FRONT_DOOR: { online: true, commMode: 'ESP-NOW', lastSeen: Date.now() },
                WINDOW_1: { online: true, commMode: 'ESP-NOW', lastSeen: Date.now() },
                BACK_DOOR: { online: true, commMode: 'ESP-NOW', lastSeen: Date.now() }
            });
            const [events, setEvents] = useState([]);
            const [toasts, setToasts] = useState([]);
            const [phoneImage, setPhoneImage] = useState(null);
            const [espcamImage, setEspcamImage] = useState(null);
            const [faceBoxes, setFaceBoxes] = useState([]);
            const [phoneFps, setPhoneFps] = useState(0);
            const [espcamFps, setEspcamFps] = useState(0);
            const [botTrail, setBotTrail] = useState([]);
            const [uptime, setUptime] = useState(0);
            const [armed, setArmed] = useState(false);
            const [selectedZone, setSelectedZone] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [showEnroll, setShowEnroll] = useState(false);
            const [weights, setWeights] = useState({ radar_presence: 0.25, pir_motion: 0.10, sound_anomaly: 0.20, unknown_face: 0.25, gas_smoke_anomaly: 0.10, auth_failure: 0.10 });
            const [nightConfig, setNightConfig] = useState({ start: 22, end: 6, factor: 2.0 });
            const [telegramConfig, setTelegramConfig] = useState({ token: '', chatId: '' });

            const toastIdRef = useRef(0);
            const eventIdRef = useRef(0);
            const phoneFrameCountRef = useRef(0);
            const espcamFrameCountRef = useRef(0);

            // Publishers
            const publishDispatch = useROSPublisher('/bot/dispatch', 'dasn_msgs/DispatchCommand');
            const publishCmdVel = useROSPublisher('/cmd_vel', 'geometry_msgs/Twist');

            // Uptime timer
            useEffect(() => {
                const interval = setInterval(() => setUptime(u => u + 1), 1000);
                return () => clearInterval(interval);
            }, []);

            // FPS counter
            useEffect(() => {
                const interval = setInterval(() => {
                    setPhoneFps(phoneFrameCountRef.current);
                    setEspcamFps(espcamFrameCountRef.current);
                    phoneFrameCountRef.current = 0;
                    espcamFrameCountRef.current = 0;
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            // Node offline checker
            useEffect(() => {
                const interval = setInterval(() => {
                    setNodeStatuses(prev => {
                        const updated = { ...prev };
                        Object.keys(updated).forEach(name => {
                            if (Date.now() - updated[name].lastSeen > 15000) {
                                updated[name] = { ...updated[name], online: false };
                            }
                        });
                        return updated;
                    });
                }, 5000);
                return () => clearInterval(interval);
            }, []);

            // Helper: add event
            const addEvent = useCallback((zone, type, level, description) => {
                const newEvent = {
                    id: ++eventIdRef.current,
                    time: formatTime(),
                    zone,
                    type,
                    level,
                    description
                };
                setEvents(prev => [newEvent, ...prev].slice(0, MAX_EVENTS));
            }, []);

            // Helper: add toast
            const addToast = useCallback((message, level, type) => {
                const id = ++toastIdRef.current;
                setToasts(prev => [{ id, message, level, type }, ...prev].slice(0, 5));
                setTimeout(() => {
                    setToasts(prev => prev.map(t => t.id === id ? { ...t, removing: true } : t));
                    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 300);
                }, 5000);
            }, []);

            const dismissToast = useCallback((id) => {
                setToasts(prev => prev.map(t => t.id === id ? { ...t, removing: true } : t));
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 300);
            }, []);

            // ─── ROS Subscriptions ───

            // Zone sensor data
            Object.keys(ZONES_CONFIG).forEach(zoneId => {
                useROSTopic(`/zone/${zoneId}/sensors`, 'dasn_msgs/ZoneSensorData', (msg) => {
                    setZoneSensorData(prev => ({ ...prev, [zoneId]: msg }));
                    setNodeStatuses(prev => ({
                        ...prev,
                        [zoneId]: { online: true, commMode: msg.comm_mode || 'ESP-NOW', lastSeen: Date.now() }
                    }));
                }, 200);

                useROSTopic(`/zone/${zoneId}/threat_level`, 'dasn_msgs/ThreatLevel', (msg) => {
                    setZoneThreats(prev => {
                        const prevLevel = prev[zoneId] ? prev[zoneId].level : 0;
                        if (msg.level >= 3 && prevLevel < 3) {
                            addToast(`${zoneId}: ${THREAT_LABELS[msg.level]}`, msg.level, 'alarm');
                        }
                        return { ...prev, [zoneId]: { level: msg.level, score: msg.score, contributing_factors: msg.contributing_factors || [] } };
                    });
                    if (msg.level >= 1) {
                        addEvent(zoneId, 'system', msg.level, `Threat level: ${THREAT_LABELS[msg.level]} (${msg.score.toFixed(2)})`);
                    }
                }, 500);
            });

            // Bot status
            useROSTopic('/bot/status', 'dasn_msgs/BotStatus', (msg) => {
                const normalized = normalizeBotStatus(msg);
                setBotStatus(prev => {
                    if (prev.status !== normalized.status) {
                        addEvent(normalized.target_zone || '', 'dispatch', normalized.status === 'stalled' ? 3 : 1, `Bot: ${normalized.status}`);
                        if (normalized.status === 'stalled') {
                            addToast('Bot stalled!', 3, 'dispatch');
                        }
                    }
                    return normalized;
                });
                if (normalized.position) {
                    setBotTrail(prev => [...prev, { x: normalized.position.x, y: normalized.position.y }].slice(-MAX_TRAIL));
                }
            }, 200);

            // Face identity
            useROSTopic('/ml/face_identity', 'dasn_msgs/FaceIdentity', (msg) => {
                const level = msg.is_known ? 0 : 3;
                const desc = msg.is_known ? `Known face: ${msg.name} (${(msg.confidence * 100).toFixed(0)}%)` : `Unknown face detected (${(msg.confidence * 100).toFixed(0)}%)`;
                addEvent('', 'face', level, desc);
                if (!msg.is_known) {
                    addToast(`Unknown face detected!`, 3, 'face');
                }
            }, 500);

            // Sound events
            useROSTopic('/ml/sound_events', 'dasn_msgs/SoundEvent', (msg) => {
                const level = ['glass_breaking', 'scream', 'gunshot', 'explosion'].includes(msg.classification) ? 3 : 1;
                addEvent(msg.zone_id || '', 'sound', level, `Sound: ${msg.classification} (${(msg.confidence * 100).toFixed(0)}%)`);
                if (level >= 3) {
                    addToast(`Sound alert: ${msg.classification}`, level, 'sound');
                }
            }, 500);

            // Gas events
            useROSTopic('/ml/gas_events', 'dasn_msgs/GasEvent', (msg) => {
                if (msg.gas_type !== 'normal') {
                    const level = msg.severity > 0.7 ? 4 : msg.severity > 0.4 ? 2 : 1;
                    addEvent(msg.zone_id || '', 'gas', level, `Gas: ${msg.gas_type} (severity ${(msg.severity * 100).toFixed(0)}%)`);
                    if (level >= 3) {
                        addToast(`Gas alert: ${msg.gas_type}`, level, 'gas');
                    }
                }
            }, 500);

            // Auth events
            useROSTopic('/security/auth_event', 'dasn_msgs/AuthEvent', (msg) => {
                const level = msg.authorized ? 0 : 2;
                const desc = msg.authorized
                    ? `Auth success: ${msg.method} at ${msg.zone_id}`
                    : `Auth FAILED: ${msg.method} at ${msg.zone_id}`;
                addEvent(msg.zone_id, 'auth', level, desc);
                if (!msg.authorized) {
                    addToast(`Auth failed at ${msg.zone_id}`, 2, 'auth');
                }
            }, 200);

            // Alarm events
            useROSTopic('/alerts/alarm', 'dasn_msgs/AlarmEvent', (msg) => {
                addEvent(msg.zone_id, 'alarm', msg.level, `ALARM: ${msg.reason}`);
                addToast(`ALARM L${msg.level}: ${msg.reason} at ${msg.zone_id}`, msg.level, 'alarm');
            }, 200);

            // Camera feeds (compressed)
            useROSTopic('/camera/phone/image_raw/compressed', 'sensor_msgs/CompressedImage', (msg) => {
                const url = compressedImageToDataUrl(msg);
                if (url) {
                    setPhoneImage(url);
                    phoneFrameCountRef.current++;
                }
            }, 100);

            useROSTopic('/camera/espcam/image_raw/compressed', 'sensor_msgs/CompressedImage', (msg) => {
                const url = compressedImageToDataUrl(msg);
                if (url) {
                    setEspcamImage(url);
                    espcamFrameCountRef.current++;
                }
            }, 100);

            // Odometry for bot position on map
            useROSTopic('/odom', 'nav_msgs/Odometry', (msg) => {
                if (msg.pose && msg.pose.pose) {
                    const pos = msg.pose.pose.position;
                    const q = msg.pose.pose.orientation;
                    const heading = Math.atan2(2 * (q.w * q.z + q.x * q.y), 1 - 2 * (q.y * q.y + q.z * q.z)) * 180 / Math.PI;
                    setBotStatus(prev => ({ ...prev, position: { x: pos.x, y: pos.y }, heading_deg: heading }));
                }
            }, 200);

            // ─── Actions ───
            const handleDispatch = useCallback((zone) => {
                const zonePos = ZONES_CONFIG[zone]?.position;
                if (!zonePos) return;
                publishDispatch({
                    target_zone: zone,
                    waypoints: [{ x: zonePos[0], y: zonePos[1], z: 0.0 }],
                    threat_level: zoneThreats[zone]?.level || 0,
                    mission_type: 'investigate'
                });
                addEvent(zone, 'dispatch', 2, `Manual dispatch to ${zone}`);
                addToast(`Bot dispatched to ${zone}`, 2, 'dispatch');
            }, [publishDispatch, zoneThreats, addEvent, addToast]);

            const handleDock = useCallback(() => {
                publishDispatch({
                    target_zone: 'DOCK',
                    waypoints: [{ x: DOCK.x, y: DOCK.y, z: 0.0 }],
                    threat_level: 0,
                    mission_type: 'dock'
                });
                addEvent('', 'system', 0, 'Return to dock commanded');
            }, [publishDispatch, addEvent]);

            const handleEstop = useCallback(() => {
                publishCmdVel({ linear: { x: 0, y: 0, z: 0 }, angular: { x: 0, y: 0, z: 0 } });
                addEvent('', 'system', 3, 'EMERGENCY STOP activated');
                addToast('EMERGENCY STOP', 4, 'alarm');
            }, [publishCmdVel, addEvent, addToast]);

            const handleArmToggle = useCallback(() => {
                setArmed(prev => {
                    const newState = !prev;
                    addEvent('', 'system', 0, newState ? 'System ARMED' : 'System DISARMED');
                    addToast(newState ? 'System Armed' : 'System Disarmed', 0, 'system');
                    return newState;
                });
            }, [addEvent, addToast]);

            return React.createElement(React.Fragment, null,
                React.createElement(StatusBar, {
                    botStatus,
                    zoneThreats,
                    nodeStatuses,
                    uptime,
                    onSettingsClick: () => setShowSettings(true)
                }),
                React.createElement(ToastManager, { toasts, onDismiss: dismissToast }),
                React.createElement(SensorDetailPanel, {
                    zoneId: selectedZone,
                    zoneData: selectedZone ? zoneSensorData[selectedZone] : null,
                    zoneThreat: selectedZone ? zoneThreats[selectedZone] : null,
                    events,
                    onClose: () => setSelectedZone(null)
                }),
                React.createElement('div', { className: 'main-content' },
                    React.createElement(ZoneMap, {
                        zoneThreats,
                        botPosition: botStatus.position,
                        botHeading: botStatus.heading_deg,
                        botTrail,
                        onZoneClick: (z) => setSelectedZone(selectedZone === z ? null : z)
                    }),
                    React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 16 } },
                        React.createElement(CameraFeeds, { phoneImage, espcamImage, faceBoxes, phoneFps, espcamFps }),
                        React.createElement(ControlPanel, {
                            armed,
                            botStatus,
                            onArmToggle: handleArmToggle,
                            onDispatch: handleDispatch,
                            onDock: handleDock,
                            onEstop: handleEstop,
                            onEnroll: () => setShowEnroll(true)
                        })
                    ),
                    React.createElement('div', { style: { gridColumn: '1 / -1' } },
                        React.createElement(EventLog, { events })
                    )
                ),
                showSettings && React.createElement(SettingsPanel, {
                    weights, setWeights,
                    nightConfig, setNightConfig,
                    telegramConfig, setTelegramConfig,
                    onClose: () => setShowSettings(false)
                }),
                showEnroll && React.createElement(EnrollModal, { onClose: () => setShowEnroll(false) })
            );
        }

        // ─── Mount ───
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(ROSProvider, null, React.createElement(App)));
    </script>
</body>
</html>
