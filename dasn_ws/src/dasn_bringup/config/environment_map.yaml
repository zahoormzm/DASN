occupancy_grid:
  # 4m x 5m room at 0.05m resolution = 80 columns x 100 rows
  resolution: 0.05
  origin:
    x: 0.0
    y: 0.0
    theta: 0.0
  width: 80
  height: 100

  # Wall definitions: cells with value 100 (occupied)
  # All other cells default to 0 (free space)
  # Format: each entry is {row, col_start, col_end} (inclusive)
  wall_cells:
    # Bottom wall (y=0): row 0, all columns
    - row: 0
      col_start: 0
      col_end: 79
    # Top wall (y=5m): row 99, all columns
    - row: 99
      col_start: 0
      col_end: 79
    # Left wall (x=0): all rows, column 0
    - col: 0
      row_start: 0
      row_end: 99
    # Right wall (x=4m): all rows, column 79
    - col: 79
      row_start: 0
      row_end: 99

  # Precomputed flat representation hint:
  # Perimeter cells are occupied (100), interior cells are free (0).
  # To reconstruct the full 80x100 grid:
  #   1. Initialize all cells to 0
  #   2. Set row 0 and row 99 entirely to 100
  #   3. Set column 0 and column 79 entirely to 100
  #
  # Total occupied cells: 2*80 + 2*(100-2) = 356
  # Total free cells: 80*100 - 356 = 7644
